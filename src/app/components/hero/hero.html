<section class="hero-section">

  <div class="container">

    <div class="hero-main">

      <!-- Left Content -->
      <div class="hero-content">

        <span class="hero-tag">
          SOFTWARE DEVELOPER
        </span>

        <h1 class="hero-title">
          Atharv
          <span>Warkari</span>
        </h1>

        <h2 class="hero-subtitle">
          Angular • ASP.NET Core MVC
        </h2>

        <p class="hero-description">
          Building structured web applications, enterprise APIs, and AI-powered
          solutions with a focus on maintainability, performance, and clean architecture.
        </p>

        <div class="hero-actions">

          <a href="#projects" class="btn-accent">
            View Projects
          </a>

          <a
            href="cv/Atharv_CV.pdf"
            target="_blank"
            class="btn-outline">

            Resume

          </a>

        </div>

        <div class="hero-socials">

          <a [href]="hero.github" target="_blank">
            <i class="fab fa-github"></i>
          </a>

          <a [href]="hero.linkedin" target="_blank">
            <i class="fab fa-linkedin"></i>
          </a>

          <a [href]="'mailto:' + hero.email">
            <i class="fas fa-envelope"></i>
          </a>

        </div>

      </div>

      <!-- Right Image -->
      <div class="hero-image">

        <div class="profile-frame">

          <img
            src="images/profile.png"
            alt="Atharv Warkari">

        </div>

      </div>

    </div>

    <!-- Stats Row -->

    <div class="hero-stats">

      <div class="stat-card">
        <h3>5+</h3>
        <p>Projects</p>
      </div>

      <div class="stat-card">
        <h3>1</h3>
        <p>Publication</p>
      </div>

      <div class="stat-card">
        <h3>8.04</h3>
        <p>CGPA</p>
      </div>

      <div class="stat-card">
        <h3>3×</h3>
        <p>SSB Conference</p>
      </div>

    </div>

  </div>

</section>
