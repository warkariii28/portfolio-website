<section id="education" class="reveal">
  <div class="container">

    <span class="section-eyebrow">
      Education
    </span>

    <h2 class="section-title">
      Academic Background
    </h2>

    <div class="section-divider"></div>

    <div class="row g-4">

      @for(item of education; track item.degree){

      <div class="col-lg-4">

        <div class="education-card card-dark p-4 h-100">
          <div
            class="education-card-bg"
            [class.be-bg]="item.degree.includes('BE')"
            [class.hsc-bg]="item.degree.includes('HSC')"
            [class.ssc-bg]="item.degree.includes('SSC')">
          </div>

          <div class="education-icon" aria-hidden="true">
            @if(item.degree.includes('BE')){
              BE
            } @else if(item.degree.includes('HSC')){
              HSC
            } @else {
              SSC
            }
          </div>

          <h5>
            {{ item.degree }}
          </h5>

          <p class="text-secondary mb-2">
            {{ item.institution }}
          </p>

          <p class="mb-2">
            {{ item.score }}
          </p>

          <small class="text-secondary">
            {{ item.year }}
          </small>

        </div>

      </div>

      }

    </div>

  </div>
</section>
