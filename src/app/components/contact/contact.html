<section id="contact">
  <div class="container">
    <span class="section-eyebrow"> Contact </span>

    <h2 class="section-title">Let's Connect</h2>

    <div class="section-divider"></div>

    <div class="contact-grid">
      <div class="contact-item card-dark">
        <i class="fas fa-location-dot"></i>
        <div>
          <h6>Location</h6>
          <p>Pune, Maharashtra, India</p>
        </div>
      </div>

      <div class="contact-item card-dark">
        <i class="fas fa-envelope"></i>
        <div>
          <h6>Email</h6>
          <p>{{ hero.email }}</p>
        </div>
      </div>

      <div class="contact-item card-dark">
        <i class="fab fa-linkedin"></i>
        <div>
          <h6>LinkedIn</h6>
          <a [href]="hero.linkedin" target="_blank"> View Profile </a>
        </div>
      </div>

      <div class="contact-item card-dark">
        <i class="fab fa-github"></i>
        <div>
          <h6>GitHub</h6>
          <a [href]="hero.github" target="_blank"> View Repository Portfolio </a>
        </div>
      </div>
    </div>
  </div>
</section>
