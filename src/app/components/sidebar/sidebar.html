<div class="sidebar">

    <img
      src="images/profile.png"
      alt="Atharv Warkari"
      class="sidebar-photo">

    <h3 class="sidebar-name">
      Atharv Warkari
    </h3>

    <p class="sidebar-role">
      Software Developer
    </p>

    <div class="sidebar-socials">

      <a
        [href]="hero.github"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="GitHub profile"
        class="social-link github-link"
        data-label="GitHub">
        <svg class="social-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.19-3.37-1.19-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.04 1.53 1.04.9 1.53 2.36 1.09 2.94.83.09-.65.35-1.09.63-1.34-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.55 9.55 0 0 1 12 5.98c.85 0 1.7.11 2.5.34 1.9-1.29 2.74-1.02 2.74-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.85-2.34 4.7-4.57 4.95.36.31.68.92.68 1.86v2.76c0 .27.18.58.69.48A10 10 0 0 0 12 2Z"></path>
        </svg>
      </a>

      <a
        [href]="hero.linkedin"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn profile"
        class="social-link linkedin-link"
        data-label="LinkedIn">
        <svg class="social-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6.94 8.75H3.56V20h3.38V8.75ZM5.25 4a1.96 1.96 0 1 0 0 3.92A1.96 1.96 0 0 0 5.25 4Zm15.18 9.55c0-3.03-1.62-4.44-3.78-4.44-1.74 0-2.52.96-2.96 1.64v-1.4h-3.37V20h3.37v-5.95c0-1.6.3-3.15 2.28-3.15 1.96 0 1.99 1.83 1.99 3.25V20h3.37l.1-6.45Z"></path>
        </svg>
      </a>

      <a
        [href]="'mailto:' + hero.email"
        aria-label="Send email"
        class="social-link email-link"
        data-label="Email">
        <svg class="social-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6h16v12H4V6Zm1.8 2 6.2 4.4L18.2 8H5.8Zm12.4 8V9.9L12 14.3 5.8 9.9V16h12.4Z"></path>
        </svg>
      </a>

    </div>

    <a
      [href]="hero.cvPath"
      target="_blank"
      rel="noopener noreferrer"
      class="resume-btn">

      Resume

    </a>

</div>
