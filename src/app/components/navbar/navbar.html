<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/" fragment="hero" (click)="closeMenu()">
      Atharv Warkari
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navMenu"
      aria-controls="navMenu"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        @for (link of navLinks; track link.anchor) {
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/"
              [fragment]="getSectionId(link.anchor)"
              [class.active-nav]="activeSection === getSectionId(link.anchor)"
              (click)="closeMenu()"
            >
              {{ link.label }}
            </a>
          </li>
        }

        <li class="navbar-actions">
          <a
            [href]="hero.cvPath"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-accent ms-lg-3"
            (click)="closeMenu()"
          >
            Resume
          </a>
          <button
            class="theme-toggle"
            type="button"
            (click)="themeService.toggleTheme()"
            [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light theme' : 'Switch to dark theme'"
          >
            @if (themeService.isDarkMode()) {
              <svg class="theme-svg" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
              </svg>
            } @else {
              <svg class="theme-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5Z"></path>
              </svg>
            }
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>
