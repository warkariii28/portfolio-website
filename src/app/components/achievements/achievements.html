<section id="achievements" class="reveal">
  <div class="container">

    <span class="section-eyebrow">
      Recognition
    </span>

    <h2 class="section-title">
      Achievements
    </h2>

    <div class="section-divider"></div>

    <div class="card-dark p-4">

      <ul class="mb-0">

        @for(item of achievements; track item){

        <li class="mb-3">
          {{ item }}
        </li>

        }

      </ul>

    </div>

  </div>
</section>
